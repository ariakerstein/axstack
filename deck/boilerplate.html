<!--
  PITCH DECK BOILERPLATE - Presentation Engine

  Use this verbatim as the outer shell for every deck.
  Replace:
    - DECK_TITLE with the actual title
    - VIEWER_BG with the theme's viewer background color
    - FONT_IMPORT with the Google Fonts @import URL
    - FONT_FAMILY with the CSS font-family value
    - TOTAL_SLIDES with the actual slide count (in nav-hint and progress)
    - Insert slide <section> elements where marked "SLIDES GO HERE"
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECK_TITLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * { font-family: 'Inter', sans-serif; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }

        .viewer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            max-width: calc((100vh - 80px) * 16 / 9);
            aspect-ratio: 16 / 9;
            background: white;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 15px 20px;
            margin-top: 10px;
            min-height: 50px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .slide-progress {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }

        .fullscreen-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 16px;
        }
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .nav-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 1000;
            animation: fadeOut 3s forwards;
            animation-delay: 3s;
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 5% 4% 4% 4%;
            box-sizing: border-box;
        }
        .slide.active {
            display: flex;
        }

        .slide-centered {
            justify-content: center;
            padding: 4rem;
        }

        .slide-number {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 500;
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            html, body {
                overflow: visible !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }

            .viewer, .slide-container {
                display: contents !important;
            }
            .controls-bar, .nav-hint {
                display: none !important;
            }

            .slide {
                overflow: hidden !important;
                page-break-after: always;
                page-break-inside: avoid;
                break-after: page;
                break-inside: avoid;
                width: 100% !important;
                max-width: 11in !important;
                height: 8.5in !important;
                min-height: 8.5in !important;
                max-height: 8.5in !important;
                display: flex !important;
                position: relative !important;
                margin: 0 auto !important;
                padding: 4rem 2.5rem 2rem 2.5rem !important;
                box-sizing: border-box !important;
            }

            .slide-centered {
                padding: 2.5rem !important;
                justify-content: center !important;
            }

            .slide:last-of-type {
                page-break-after: avoid;
                break-after: avoid;
            }

            @page {
                margin: 0;
                size: 11in 8.5in landscape;
            }
        }
    </style>
</head>
<body>

<div class="nav-hint">Use arrow keys to navigate | TOTAL_SLIDES slides</div>

<div class="viewer">
    <div class="slide-container" id="slideContainer">

<!-- ══════════════════════════════════════════════════════
     SLIDES GO HERE
     ══════════════════════════════════════════════════════ -->

    </div>

    <div class="controls-bar">
        <button class="nav-btn" id="prevBtn" aria-label="Previous slide">&#8592;</button>
        <div class="slide-progress" id="progress">1 / TOTAL_SLIDES</div>
        <button class="nav-btn" id="nextBtn" aria-label="Next slide">&#8594;</button>
        <button class="fullscreen-btn" id="fullscreenBtn" aria-label="Fullscreen">&#x26F6;</button>
        <button class="fullscreen-btn" id="printBtn" aria-label="Download PDF" title="Print/Save as PDF">&#x2B07;</button>
    </div>
</div>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progress = document.getElementById('progress');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const printBtn = document.getElementById('printBtn');

    function showSlide(index) {
        slides.forEach(s => s.classList.remove('active'));
        slides[index].classList.add('active');
        progress.textContent = `${index + 1} / ${totalSlides}`;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === totalSlides - 1;
    }

    function nextSlide() {
        if (currentSlide < totalSlides - 1) {
            currentSlide++;
            showSlide(currentSlide);
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            showSlide(currentSlide);
        }
    }

    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    });

    printBtn.addEventListener('click', () => {
        window.print();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault();
            nextSlide();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            prevSlide();
        }
    });

    showSlide(0);
</script>

</body>
</html>
